services:
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: shieldscan-zap
    command: zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.key=changeme
    ports:
      - "8081:8080"
    networks:
      - shieldscan-net

  dvwa:
    image: vulnerables/web-dvwa
    container_name: shieldscan-dvwa
    ports:
      - "4280:80"
    networks:
      - shieldscan-net

  juiceshop:
    image: bkimminich/juice-shop
    container_name: shieldscan-juiceshop
    ports:
      - "3000:3000"
    networks:
      - shieldscan-net

networks:
  shieldscan-net:
    driver: bridge
